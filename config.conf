# OLED Ultra Black Keeper configuration
#
# Defaults below work out of the box on the Unihertz Odin 3.
# The stock ROM never persists Ultra Black Mode; this module re-applies
# it at every boot and guards it with a watchdog.

# --- The Ultra Black Mode kernel node (discovered via PServiceBridgeV2) ---
# 1 = Ultra Black ON, 0 = OFF
SYSFS_PATH=/sys/class/enhance_color_class/enhance_color_device/enhance_color
SYSFS_VALUE=1

# --- Alternative methods (unused on Odin 3, kept for other devices) ---
SETTING_NAMESPACE=
SETTING_KEY=
SETTING_VALUE=1
PROP_KEY=
PROP_VALUE=1

# --- Watchdog ---
# 0 = apply once at boot only
# N = re-check every N seconds and re-apply if something turned it off
WATCHDOG_INTERVAL=30
